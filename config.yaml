data:
  raw_path: data/raw/WA_Fn-UseC_-Telco-Customer-Churn.csv
  processed_path: data/processed/telco_clean.parquet
  features_path: data/processed/telco_features.parquet

features:
  raw_service_cols:
    - OnlineSecurity
    - OnlineBackup
    - DeviceProtection
    - TechSupport
    - StreamingTV
    - StreamingMovies
    - PhoneService
  categorical_cols:
    - MultipleLines
    - InternetService
    - Contract
    - tenure_bucket
  drop_cols:
    - customerID
    - gender
    - Partner
    - Dependents
    - PaperlessBilling
    - PaymentMethod

model:
  test_size: 0.2
  random_state: 42
  threshold: 0.40
  smote: true
  output_dir: models/

  logistic_regression:
    C: 0.1
    max_iter: 1000

  random_forest:
    n_estimators: 300
    max_depth: 8
    min_samples_leaf: 20

  xgboost:
    n_estimators: 300
    max_depth: 4
    learning_rate: 0.05
    subsample: 0.8
    colsample_bytree: 0.8

dashboard:
  default_model: XGBoost
  default_threshold: 0.40
